<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="chipGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chipRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="chipTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="chipBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#25c2a0" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Glow under stack -->
  <ellipse cx="50" cy="84" rx="26" ry="5" fill="#25c2a0" opacity="0.1"/>

  <!-- ===== CHIP 1 (Blue) — bottom, offset right ===== -->
  <g transform="translate(5, 12)">
    <ellipse cx="50" cy="68" rx="23" ry="9.5" fill="#1a3a8a"/>
    <rect x="27" y="64" width="46" height="4" fill="#1a3a8a"/>
    <ellipse cx="50" cy="64" rx="23" ry="9.5" fill="url(#chipBlue)"/>
    <!-- 6 edge notches evenly spaced -->
    <rect x="28" y="62.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.45)" transform="rotate(-20 30.5 63.5)"/>
    <rect x="66.5" y="62.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.45)" transform="rotate(20 69.5 63.5)"/>
    <rect x="36" y="55" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.45)" transform="rotate(-5 38.5 55.5)"/>
    <rect x="58" y="55" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.45)" transform="rotate(5 61 55.5)"/>
    <rect x="36" y="72" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)" transform="rotate(5 38.5 72.5)"/>
    <rect x="58" y="72" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)" transform="rotate(-5 61 72.5)"/>
    <!-- Inner ring -->
    <ellipse cx="50" cy="64" rx="14.5" ry="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3.5 2.5"/>
  </g>

  <!-- ===== CHIP 2 (Red) — offset left ===== -->
  <g transform="translate(-4, 2)">
    <ellipse cx="50" cy="58" rx="23" ry="9.5" fill="#7f1d1d"/>
    <rect x="27" y="54" width="46" height="4" fill="#7f1d1d"/>
    <ellipse cx="50" cy="54" rx="23" ry="9.5" fill="url(#chipRed)"/>
    <rect x="28" y="52.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.45)" transform="rotate(-20 30.5 53.5)"/>
    <rect x="66.5" y="52.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.45)" transform="rotate(20 69.5 53.5)"/>
    <rect x="36" y="45" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.45)" transform="rotate(-5 38.5 45.5)"/>
    <rect x="58" y="45" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.45)" transform="rotate(5 61 45.5)"/>
    <rect x="36" y="62" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)" transform="rotate(5 38.5 62.5)"/>
    <rect x="58" y="62" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)" transform="rotate(-5 61 62.5)"/>
    <ellipse cx="50" cy="54" rx="14.5" ry="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3.5 2.5"/>
  </g>

  <!-- ===== CHIP 3 (Gold) — slight right ===== -->
  <g transform="translate(2, -8)">
    <ellipse cx="50" cy="48" rx="23" ry="9.5" fill="#92400e"/>
    <rect x="27" y="44" width="46" height="4" fill="#92400e"/>
    <ellipse cx="50" cy="44" rx="23" ry="9.5" fill="url(#chipGold)"/>
    <rect x="28" y="42.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.5)" transform="rotate(-20 30.5 43.5)"/>
    <rect x="66.5" y="42.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.5)" transform="rotate(20 69.5 43.5)"/>
    <rect x="36" y="35" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.5)" transform="rotate(-5 38.5 35.5)"/>
    <rect x="58" y="35" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.5)" transform="rotate(5 61 35.5)"/>
    <rect x="36" y="52.5" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.4)" transform="rotate(5 38.5 53)"/>
    <rect x="58" y="52.5" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.4)" transform="rotate(-5 61 53)"/>
    <ellipse cx="50" cy="44" rx="14.5" ry="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3.5 2.5"/>
  </g>

  <!-- ===== CHIP 4 (Teal/brand) — top, centered ===== -->
  <g transform="translate(-1, -18)">
    <ellipse cx="50" cy="38" rx="23" ry="9.5" fill="#065f46"/>
    <rect x="27" y="34" width="46" height="4" fill="#065f46"/>
    <ellipse cx="50" cy="34" rx="23" ry="9.5" fill="url(#chipTeal)"/>
    <rect x="28" y="32.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.55)" transform="rotate(-20 30.5 33.5)"/>
    <rect x="66.5" y="32.5" width="5.5" height="2" rx="1" fill="rgba(255,255,255,0.55)" transform="rotate(20 69.5 33.5)"/>
    <rect x="36" y="25" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.55)" transform="rotate(-5 38.5 25.5)"/>
    <rect x="58" y="25" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.55)" transform="rotate(5 61 25.5)"/>
    <rect x="36" y="42.5" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.4)" transform="rotate(5 38.5 43)"/>
    <rect x="58" y="42.5" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.4)" transform="rotate(-5 61 43)"/>
    <ellipse cx="50" cy="34" rx="14.5" ry="6" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-dasharray="3.5 2.5"/>
    <!-- Star/diamond center decoration -->
    <polygon points="50,29 52,33 50,37 48,33" fill="rgba(255,255,255,0.5)"/>
    <polygon points="45,33 50,31 55,33 50,35" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Sparkles -->
  <circle cx="38" cy="13" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="35" cy="15.5" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="64" cy="17" r="0.8" fill="white" opacity="0.5"/>
</svg>
