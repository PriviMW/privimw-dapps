  <path d="M32 44Q41 36 50 44T68 44" fill="none" stroke="url(#shield)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M32 54Q41 46 50 54T68 54" fill="none" stroke="url(#shield)" stroke-width="2.5" stroke-linecap="round"/>
