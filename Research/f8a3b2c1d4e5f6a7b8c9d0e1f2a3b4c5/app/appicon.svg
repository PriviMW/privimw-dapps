<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25c2a0"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25c2a0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="2"/>

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="38" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Swap arrows icon -->
  <g transform="translate(50, 50)">
    <!-- Top-left to bottom-right arrow -->
    <path d="M -15 -8 L 8 -8 L 8 -15 L 20 -2 L 8 11 L 8 4 L -15 4 Z"
          fill="url(#accentGrad)" opacity="0.9"/>

    <!-- Bottom-right to top-left arrow -->
    <path d="M 15 8 L -8 8 L -8 15 L -20 2 L -8 -11 L -8 -4 L 15 -4 Z"
          fill="url(#accentGrad)" opacity="0.6"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="20" cy="20" r="3" fill="#25c2a0" opacity="0.5"/>
  <circle cx="80" cy="80" r="3" fill="#00d4ff" opacity="0.5"/>
</svg>
